name: Android Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag. Defaults to v<versionName>."
        required: false
        type: string
      prerelease:
        description: "Mark GitHub release as a prerelease."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  signed-release:
    name: Build signed release artifacts
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for signed release builds"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;30.0.14904198"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'transcribe-rs/**/Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          keystore="$RUNNER_TEMP/voice-inbox-release.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore"
          echo "ANDROID_KEYSTORE_FILE=$keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease

      - name: Build signed release AAB
        run: ./gradlew :app:bundleRelease

      - name: Stage release files
        id: release_files
        run: |
          version=$(grep 'versionName =' app/build.gradle.kts | head -n1 | cut -d '"' -f2)
          if [ -z "$version" ]; then
            echo "::error::Unable to read versionName from app/build.gradle.kts"
            exit 1
          fi
          tag="${{ inputs.tag_name }}"
          if [ -z "$tag" ]; then
            tag="v$version"
          fi

          mkdir -p release-dist
          cp app/build/outputs/apk/release/app-release.apk "release-dist/voice-inbox-$version.apk"
          cp app/build/outputs/bundle/release/app-release.aab "release-dist/voice-inbox-$version.aab"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "apk=release-dist/voice-inbox-$version.apk" >> "$GITHUB_OUTPUT"
          echo "aab=release-dist/voice-inbox-$version.aab" >> "$GITHUB_OUTPUT"

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: voice-inbox-release-apk
          path: ${{ steps.release_files.outputs.apk }}
          if-no-files-found: error

      - name: Upload signed release AAB
        uses: actions/upload-artifact@v4
        with:
          name: voice-inbox-release-aab
          path: ${{ steps.release_files.outputs.aab }}
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_files.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release_files.outputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          prerelease_args=""
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_args="--prerelease"
          fi

          gh release create "$RELEASE_TAG" \
            "${{ steps.release_files.outputs.apk }}" \
            "${{ steps.release_files.outputs.aab }}" \
            --target "$GITHUB_SHA" \
            --title "Voice Inbox $RELEASE_VERSION" \
            --notes "Signed Android release artifacts for Voice Inbox $RELEASE_VERSION." \
            $prerelease_args
