name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUBLIC_GA_ID: ${{ vars.PUBLIC_GA_ID }}

    defaults:
      run:
        working-directory: website

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify analytics snippet
        run: |
          if [ -z "$PUBLIC_GA_ID" ]; then
            echo "::notice::PUBLIC_GA_ID is not configured; Google Analytics snippet was intentionally omitted."
            exit 0
          fi

          if ! grep -R "googletagmanager.com/gtag/js?id=$PUBLIC_GA_ID" dist >/dev/null; then
            echo "::error::PUBLIC_GA_ID is configured, but the Google Analytics snippet was not found in dist."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
